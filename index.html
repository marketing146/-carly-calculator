<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carly Dashboard v9.50.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter+Tight:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f8;--bg2:#fff;--bg3:#fff;--border:rgba(255,255,255,0.7);--text:#1a1a2e;--text2:#555770;--text3:#6b7280;--red:#dc2626;--red2:#ef4444;--red-g:rgba(220,38,38,0.05);--status-warn:#b91c1c;--accent-rose:#991b1b;--accent-burnt:#b91c1c;--amb:#ef4444;--sb-w:260px;--r:18px;--rs:14px;--blur:blur(20px);--glass:rgba(255,255,255,0.55);--glass-border:1.5px solid rgba(255,255,255,0.7);--glass-shadow:0 8px 32px rgba(26,26,46,0.06);--shadow-sm:0 2px 8px rgba(26,26,46,0.04);--shadow-red:0 6px 20px rgba(220,38,38,0.2);
/* ═══ Design System v1.0 — unified tokens (additive; screens adopt per-refactor) ═══ */
--ink:#1a1a2e;--ink-2:#555770;--ink-3:#6b7280;--ink-4:#9ca3af;
--red-900:#991b1b;--red-700:#b91c1c;--red-600:#dc2626;--red-500:#ef4444;--red-tint:rgba(220,38,38,0.05);
--brand-gradient:linear-gradient(135deg,#991b1b,#dc2626,#ef4444);
--ok:#16a34a;--warn:#b45309;--danger:#dc2626;--muted:#6b7280;
--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-pill:999px;
--e1:0 8px 32px rgba(26,26,46,0.06);--e2:0 8px 24px rgba(26,26,46,0.10);--e-red:0 6px 20px rgba(220,38,38,0.25);
--glass-55:rgba(255,255,255,0.55);--glass-65:rgba(255,255,255,0.65);--glass-88:rgba(255,255,255,0.88);--glass-brd:1.5px solid rgba(255,255,255,0.7);--glass-blur:blur(18px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'IBM Plex Sans Arabic',sans-serif}
*:focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:4px}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:linear-gradient(135deg,#f0f2f8 0%,#fef2f2 30%,#fdf2f2 60%,#f0f2f8 100%);background-attachment:fixed;color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.5}
input,select,textarea,button{font-family:'IBM Plex Sans Arabic',sans-serif;outline:none}
/* === NEW TYPOGRAPHY UTILITY CLASSES === */
.font-display{font-family:'IBM Plex Sans Arabic',sans-serif;letter-spacing:-0.015em;font-weight:700}
.font-display-light{font-family:'IBM Plex Sans Arabic',sans-serif;letter-spacing:-0.02em;font-weight:300}
.font-num{font-family:'Inter Tight',sans-serif;font-feature-settings:"tnum","cv11","ss01";font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:var(--text3)}
.eyebrow-red{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--red)}
/* Auto-apply Inter Tight to elements with class num-display */
.num-display{font-family:'Inter Tight',sans-serif;font-feature-settings:"tnum","cv11","ss01";font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.offers-scroll::-webkit-scrollbar{display:none}
.offers-carousel::-webkit-scrollbar{height:4px}
.offers-carousel::-webkit-scrollbar-track{background:rgba(220,38,38,0.04);border-radius:4px}
.offers-carousel::-webkit-scrollbar-thumb{background:rgba(220,38,38,0.3);border-radius:4px}
.offers-carousel::-webkit-scrollbar-thumb:hover{background:rgba(220,38,38,0.5)}
.offers-carousel{scrollbar-width:thin;scrollbar-color:rgba(220,38,38,0.3) rgba(220,38,38,0.04)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadingBar{from{width:20%}to{width:100%}}
@keyframes offerGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes stepPulse{0%,100%{box-shadow:0 4px 16px rgba(220,38,38,0.35),0 0 0 6px rgba(220,38,38,0.1)}50%{box-shadow:0 4px 20px rgba(220,38,38,0.5),0 0 0 12px rgba(220,38,38,0.05)}}
.step-pulse{animation:stepPulse 2.4s ease-in-out infinite}
.fu{animation:fadeUp .4s ease-out both}.fu1{animation-delay:.05s}.fu2{animation-delay:.1s}.fu3{animation-delay:.15s}.fu4{animation-delay:.2s}
/* Skeleton loading */
.skel{background:linear-gradient(90deg,rgba(0,0,0,0.04) 25%,rgba(0,0,0,0.08) 50%,rgba(0,0,0,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
.skel-h{height:24px;width:60%;margin-bottom:12px}
.skel-t{height:14px;width:80%;margin-bottom:8px}
.skel-card{height:120px;border-radius:16px;margin-bottom:12px}
.skel-bar{height:32px;border-radius:10px;margin-bottom:6px}
/* Scroll to top */
.scroll-top{position:fixed;bottom:24px;z-index:180;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(220,38,38,0.3);transition:all 0.3s;opacity:0;transform:translateY(20px);pointer-events:none}
.scroll-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(220,38,38,0.4)}
/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
.empty-icon{width:72px;height:72px;border-radius:50%;background:rgba(220,38,38,0.04);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.empty-title{font-size:16px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.empty-desc{font-size:12px;color:#9ca3af;max-width:280px;line-height:1.6}
/* Sidebar */
[dir="rtl"] .sb{position:fixed;top:0;right:0;left:auto;width:var(--sb-w);height:100vh;background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1.5px solid rgba(255,255,255,0.7);border-right:none;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
[dir="ltr"] .sb{position:fixed;top:0;left:0;right:auto;width:var(--sb-w);height:100vh;background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1.5px solid rgba(255,255,255,0.7);border-left:none;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-hd{padding:24px 20px;border-bottom:1px solid rgba(220,38,38,0.08);display:flex;align-items:center;gap:12px}
.sb-logo{width:44px;height:44px;border-radius:12px;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;flex-shrink:0;overflow:hidden}
.sb-br{font-size:20px;font-weight:900;letter-spacing:1.5px;color:var(--text)}
.sb-br small{display:block;font-size:9px;font-weight:500;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto}
.sb-sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:2px;padding:12px 14px 6px}
.ni{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--rs);cursor:pointer;font-size:14px;font-weight:600;color:var(--text2);transition:all .2s;margin-bottom:2px;position:relative;-webkit-user-select:none;user-select:none}
.ni:hover{background:rgba(220,38,38,0.06);color:var(--text)}
.ni.act{background:var(--red-g);color:var(--red);font-weight:700}
[dir="rtl"] .ni.act::before{content:'';position:absolute;left:0;right:auto;top:50%;transform:translateY(-50%);width:3px;height:26px;border-radius:0 4px 4px 0;background:var(--red)}
[dir="ltr"] .ni.act::before{content:'';position:absolute;right:0;left:auto;top:50%;transform:translateY(-50%);width:3px;height:26px;border-radius:4px 0 0 4px;background:var(--red)}
.ni-i{font-size:16px;width:22px;text-align:center;flex-shrink:0;color:var(--text3)}
.ni:focus-visible{outline:2px solid var(--red);outline-offset:2px}
[dir="rtl"] .ni-b{margin-right:auto;margin-left:0;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--red);color:#fff}
[dir="ltr"] .ni-b{margin-left:auto;margin-right:0;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--red);color:#fff}
.sb-ft{padding:16px 20px;border-top:1px solid rgba(220,38,38,0.06);display:flex;align-items:center;gap:8px}
.av{width:36px;height:36px;border-radius:12px;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;overflow:hidden}
/* Main */
[dir="rtl"] .mn{margin-right:var(--sb-w);margin-left:0;min-height:100vh;padding:24px 30px}
[dir="ltr"] .mn{margin-left:var(--sb-w);margin-right:0;min-height:100vh;padding:24px 30px}
.ph{margin-bottom:24px}.ph h1{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-.5px}.ph p{font-size:13px;color:var(--text3);margin-top:3px}
.ph-act{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
/* KPI */
.kpi-g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:var(--glass-border);border-radius:var(--r);padding:22px;position:relative;overflow:hidden;transition:all .3s;box-shadow:var(--glass-shadow)}
.kpi:hover{border-color:rgba(220,38,38,0.12);transform:translateY(-2px);box-shadow:var(--shadow-red)}
.kpi-ic{width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.kpi-v{font-size:32px;font-weight:900;line-height:1;margin-bottom:4px}
.kpi-l{font-size:11px;color:var(--text3);font-weight:600}
/* Card */
.cd{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:var(--glass-border);border-radius:var(--r);overflow:hidden;box-shadow:var(--glass-shadow);transition:all .3s}
.cd:hover{border-color:rgba(220,38,38,0.12);box-shadow:var(--shadow-red)}
.cd-hd{padding:16px 20px;border-bottom:1.5px solid rgba(255,255,255,0.5);display:flex;justify-content:space-between;align-items:center}
.cd-t{font-size:15px;font-weight:800;color:var(--text)}
.cd-bd{padding:18px 20px}
/* Table */
.tbl{width:100%;border-collapse:collapse}
[dir="rtl"] .tbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;text-align:right;border-bottom:1.5px solid var(--border)}
[dir="ltr"] .tbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;text-align:left;border-bottom:1.5px solid var(--border)}
.tbl td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.5);font-size:13px}
.tbl tr:hover td{background:rgba(220,38,38,0.03)}
.prov-c{display:flex;align-items:center;gap:8px}
.prov-l{width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.prov-l img{width:100%;height:100%;object-fit:contain}
/* Badges */
.bg{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
.bg-bk{background:rgba(153,27,27,.08);color:#991b1b}
.bg-fc{background:rgba(220,38,38,.08);color:#dc2626}
.bg-rd{background:var(--red-g);color:var(--red)}
/* Search */
.sb-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.s-inp{flex:1;min-width:200px;padding:12px 18px;border-radius:var(--rs);border:var(--glass-border);background:rgba(255,255,255,0.6);backdrop-filter:var(--blur);color:var(--text);font-size:13px;font-weight:600}
.s-inp:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-g)}
.s-inp::placeholder{color:var(--text3)}
.fp{display:flex;gap:4px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);border-radius:var(--rs);padding:3px;border:var(--glass-border)}
.fp-b{padding:7px 14px;border-radius:12px;border:none;font-size:10px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;transition:all .2s;background:transparent;color:var(--text3)}
.fp-b.act{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 6px 20px rgba(220,38,38,0.2)}
/* Buttons */
.btn{padding:9px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'IBM Plex Sans Arabic',sans-serif;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 6px 20px rgba(220,38,38,0.2)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(220,38,38,0.2)}
.btn-g{background:rgba(255,255,255,0.6);color:var(--text2);border:var(--glass-border);backdrop-filter:var(--blur)}
.btn-g:hover{background:#fff;color:var(--text)}
.btn-i{width:34px;height:34px;border-radius:var(--rs);border:var(--glass-border);background:rgba(255,255,255,0.6);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;backdrop-filter:var(--blur)}
.btn-i:hover{background:#fff;color:var(--text)}
.btn-sm{padding:6px 12px;font-size:10px}
/* Stat bars */
.st-bar{height:7px;background:rgba(255,255,255,0.5);border-radius:4px;margin-top:6px;overflow:hidden}
.st-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(26,26,46,.25);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:rgba(255,255,255,0.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:var(--glass-border);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,26,46,0.12)}
.modal-hd{padding:18px 20px;border-bottom:1.5px solid rgba(255,255,255,0.5);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);z-index:1}
.modal-bd{padding:20px}
.modal-ft{padding:14px 20px;border-top:1.5px solid rgba(255,255,255,0.5);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px)}
/* Form */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.fg input,.fg select{width:100%;padding:10px 14px;border-radius:var(--rs);border:var(--glass-border);background:rgba(255,255,255,0.7);color:var(--text);font-size:13px;font-weight:700}
.fg input:focus,.fg select:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-g)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Hamburger */
[dir="rtl"] .hmb{display:none;position:fixed;top:12px;right:12px;left:auto;z-index:200;width:42px;height:42px;border-radius:12px;background:rgba(0,0,0,0.06);backdrop-filter:var(--blur);border:var(--glass-border);cursor:pointer;align-items:center;justify-content:center;font-size:18px;color:var(--text);box-shadow:var(--shadow-sm)}
[dir="ltr"] .hmb{display:none;position:fixed;top:12px;left:12px;right:auto;z-index:200;width:42px;height:42px;border-radius:12px;background:rgba(0,0,0,0.06);backdrop-filter:var(--blur);border:var(--glass-border);cursor:pointer;align-items:center;justify-content:center;font-size:18px;color:var(--text);box-shadow:var(--shadow-sm)}
/* Responsive */
/* ====== RESPONSIVE BREAKPOINTS ====== */
@media(max-width:1024px){
  .kpi-g{grid-template-columns:repeat(2,1fr)}
  .fg-row3{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  [dir="rtl"] .sb{transform:translateX(100%)}[dir="rtl"] .sb.open{transform:translateX(0)}
  [dir="ltr"] .sb{transform:translateX(-100%)}[dir="ltr"] .sb.open{transform:translateX(0)}
  .hmb{display:flex}
  [dir="rtl"] .mn{margin-right:0}
  [dir="ltr"] .mn{margin-left:0}
  .mn{padding:14px;padding-top:64px}
  .kpi-g{grid-template-columns:repeat(2,1fr)}
  .fg-row,.fg-row3{grid-template-columns:1fr}
  .ph h1{font-size:20px}
  .ph-act{flex-direction:column}
  .ph-act .btn{width:100%;justify-content:center}
  .cd-hd{flex-wrap:wrap;gap:8px}
  .sb-bar{flex-direction:column}
  .s-inp{min-width:100%;width:100%}
  .tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl th,.tbl td{white-space:nowrap}
  .mob-hd{display:flex!important}
  .btn,.fp-b{min-height:44px;min-width:44px}
  .ni{min-height:44px;padding:12px}
  .modal{max-width:100%;margin:8px;border-radius:16px;max-height:calc(100vh - 16px)}
  .modal-bd{padding:14px}
  .modal-hd{padding:14px}
  .modal-ft{padding:10px 14px}
  .fp{flex-wrap:wrap;gap:4px}
  .fp-b{padding:8px 10px;font-size:9px}
  .btn-i{min-width:44px;min-height:44px}
  .prov-l{width:36px;height:36px}
  .offer-grid{grid-template-columns:1fr!important}
  /* Enhanced mobile: overview hero grid */
  .hero-grid-5{grid-template-columns:1fr 1fr!important}
  .hero-grid-5>div:first-child{grid-column:1/-1}
  /* Sort/filter bar mobile */
  .ctrl-bar{flex-direction:column!important;gap:10px!important}
  .ctrl-bar .fx{width:100%;justify-content:stretch}
  .ctrl-bar .fx>*{flex:1}
  /* Charts side by side → stack */
  .charts-grid-2{grid-template-columns:1fr!important}
  /* Result cards: smaller padding */
  .res-card{padding:12px!important;border-radius:14px!important}
  /* Settings tabs mobile */
  [dir="rtl"] .scroll-top{left:16px;right:auto}
  [dir="ltr"] .scroll-top{right:16px;left:auto}
}
@media(max-width:480px){
  .kpi-g{grid-template-columns:1fr}
  .kpi-v{font-size:22px}
  .kpi{padding:14px}
  .mn{padding:8px;padding-top:60px}
  .cd-bd{padding:10px}
  .cd-hd{padding:10px 12px}
  .ph h1{font-size:17px}
  .ph p{font-size:11px}
  .tbl th{font-size:10px;padding:8px 10px}
  .tbl td{padding:10px;font-size:11px}
  .modal-ov{padding:4px}
  .modal{border-radius:12px}
  .bg{font-size:10px;padding:2px 6px}
  .sb-bar .btn{width:100%}
  .fg label{font-size:10px}
  .fg input,.fg select{padding:8px 12px;font-size:12px}
  .offer-grid{grid-template-columns:1fr!important}
  .offer-full-hdr{padding:16px!important}
  .offer-full-logo{width:50px!important;height:50px!important;border-radius:16px!important}
  .offer-full-hero{font-size:28px!important}
  /* Enhanced: overview hero → single column */
  .hero-grid-5{grid-template-columns:1fr!important}
  /* Sort pills → 2 per row */
  .sort-pills{display:grid!important;grid-template-columns:1fr 1fr!important;gap:4px!important}
  .sort-pills button{font-size:10px!important;padding:8px 10px!important}
  /* Summary stats → 2x2 */
  .stats-4{grid-template-columns:1fr 1fr!important}
  /* Settings tabs → vertical stack */
  /* Phase 5: Sticky footer mobile */
  .sticky-footer{margin-inline:-8px!important;margin-bottom:-8px!important}
  .sticky-footer button{font-size:11px!important;padding:9px 12px!important}
}
@media(max-width:768px){
  .sticky-footer{margin-inline:-14px!important;margin-bottom:-14px!important}
  .sens-grid{grid-template-columns:1fr!important}
}
/* Feature #2: Presentation Mode — Clean UI for client-facing display */
.presentation-mode .pm-hide{display:none!important}
.presentation-mode .gc{box-shadow:0 12px 40px rgba(26,26,46,0.1)!important}
.presentation-mode body{background:linear-gradient(135deg,#fafafa 0%,#fff 50%,#fafafa 100%)!important}
.presentation-mode .pm-bigger{font-size:1.05em!important}
.presentation-mode-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#dc2626,#991b1b);color:#fff;padding:8px 16px;text-align:center;font-size:11px;font-weight:700;z-index:200;box-shadow:0 2px 12px rgba(220,38,38,0.3);display:flex;align-items:center;justify-content:center;gap:10px}
/* Feature #6: Offer Expiry Pulse Animation */
@keyframes pulseUrgent{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.6)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.expiry-pulse{animation:pulseUrgent 2s ease-in-out infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-1px)}75%{transform:translateX(1px)}}
@keyframes cardMarquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes bannerKenBurns{from{transform:scale(1)}to{transform:scale(1.045)}}
.expiry-shake-soft{animation:shake 0.4s ease-in-out 3}
.mob-hd{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,255,255,0.85);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid rgba(220,38,38,0.08);z-index:150;align-items:center;padding:0 14px;gap:8px}
.mob-hd-logo{width:32px;height:32px;border-radius:8px;overflow:hidden;flex-shrink:0}
.mob-hd-logo img{width:100%;height:100%;object-fit:cover}
.mob-hd-title{font-size:16px;font-weight:900;color:var(--red);letter-spacing:1px}
/* Skip to content link */
.skip-link{position:absolute;top:-100%;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:12px 24px;border-radius:0 0 12px 12px;font-weight:700;font-size:13px;z-index:9999;text-decoration:none;transition:top .2s}
.skip-link:focus{top:0}
/* Focus visible improvements */
button:focus-visible,.ni:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:4px}
/* === UTILITY CLASSES === */
/* Layout */
.fx{display:flex}.fx-c{display:flex;align-items:center}.fx-b{display:flex;align-items:center;justify-content:space-between}.fx-col{display:flex;flex-direction:column}.fx-w{flex-wrap:wrap}.f1{flex:1}.g4{gap:4px}.g8{gap:8px}.g12{gap:12px}.g16{gap:16px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Spacing */
.p12{padding:12px}.p16{padding:16px}.p-card{padding:14px 18px}.p-card-lg{padding:16px 20px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}
/* Typography */
.t-xs{font-size:10px}.t-sm{font-size:11px}.t-md{font-size:12px}.t-base{font-size:13px}.t-lg{font-size:14px}.t-xl{font-size:16px}.t-2xl{font-size:20px}
.w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}.w7{font-weight:700}.w8{font-weight:800}.w9{font-weight:900}
.c1{color:var(--text)}.c2{color:var(--text2)}.c3{color:var(--text3)}.c-red{color:var(--red)}.c-mute{color:#9ca3af}
.t-label{font-size:10px;font-weight:600;color:var(--text3)}.t-label-b{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;display:block}
.t-val{font-size:13px;font-weight:800}.t-val-lg{font-size:14px;font-weight:800;color:var(--text)}
/* Components */
.gc{background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;border:1.5px solid rgba(255,255,255,0.7);box-shadow:0 8px 32px rgba(26,26,46,0.06);overflow:hidden}
.gc-hd{padding:14px 18px;border-bottom:1.5px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:8px}
.gc-hd-s{padding:14px 18px;border-bottom:1.5px solid rgba(0,0,0,0.04);display:flex;align-items:center;gap:8px}
.gc-body{padding:16px 20px}
.fi{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.65);font-size:13px;font-weight:600}
.fi-sm{width:100%;padding:10px 12px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.5);font-size:12px;font-weight:600}
.empty-state{text-align:center;color:#9ca3af;font-size:12px;padding:20px}
.bar-track{flex:1;height:14px;background:rgba(26,26,46,0.03);border-radius:8px;overflow:hidden}
.pos-r{position:relative}
